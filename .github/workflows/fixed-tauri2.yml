name: FIXED Tauri 2.0 Build ✅

on:
  workflow_dispatch:

jobs:
  build-fixed:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install with clean slate
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Verify Tauri 2.0 compatibility
        run: |
          echo "=== Tauri versions ==="
          npm list @tauri-apps/api @tauri-apps/cli
          echo "=== API vs CLI compatibility ==="
          echo "API: $(npm list @tauri-apps/api | grep @tauri-apps/api)"
          echo "CLI: $(npm list @tauri-apps/cli | grep @tauri-apps/cli)"

      - name: Build Tauri 2.0 (FIXED)
        run: |
          cd src-tauri
          echo "=== Building Tauri 2.0 ==="
          
          # Build simple
          npx @tauri-apps/cli build \
            --target x86_64-apple-darwin \
            --verbose 2>&1 | tee /tmp/build.log
          
          echo "=== Build output (last 100 lines) ==="
          tail -100 /tmp/build.log

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: CLAWDESK-FIXED
          path: |
            src-tauri/target/**/*.dmg
            src-tauri/target/**/*.app
          if-no-files-found: error