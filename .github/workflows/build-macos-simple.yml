name: Build CLAWDESK Ultimate SIMPLE 🍎

on:
  workflow_dispatch:  # Solo manual, no automático

jobs:
  build-macos-simple:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: npm install @tauri-apps/cli

      - name: Create proper icons for macOS
        run: |
          cd src-tauri
          # Crear iconos simples pero válidos
          mkdir -p icons
          echo "iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAB" > icons/icon.icns
          echo "iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAB" > icons/32x32.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAACXBIWXMAAAsTAAALEwEAmpwYAAAB" > icons/128x128.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAACXBIWXMAAAsTAAALEwEAmpwYAAAB" > icons/128x128@2x.png

      - name: Build with Tauri (VERBOSE)
        run: |
          cd src-tauri
          echo "=== Current directory ==="
          pwd
          ls -la
          echo "=== Icons ==="
          ls -la icons/
          echo "=== Starting Tauri build ==="
          npx @tauri-apps/cli build --target x86_64-apple-darwin --verbose 2>&1 | tail -100
          echo "=== Build artifacts ==="
          find . -name "*.dmg" -o -name "*.app" | xargs -I {} echo "Found: {}"

      - name: Find and list ALL build outputs
        run: |
          echo "=== SEARCHING FOR BUILD OUTPUTS ==="
          find src-tauri -type f \( -name "*.dmg" -o -name "*.app" -o -name "*.tar.gz" -o -name "*.zip" -o -name "*.pkg" \) | xargs -I {} echo "FOUND: {}"
          echo "=== TARGET DIRECTORY ==="
          ls -la src-tauri/target/ || true
          ls -la src-tauri/target/*/ || true
          ls -la src-tauri/target/*/*/ || true
          
          # Buscar específicamente donde Tauri pone los builds
          DMG_PATH=$(find src-tauri -name "*.dmg" -type f | head -1)
          if [ -n "$DMG_PATH" ]; then
            echo "✅ Found DMG: $DMG_PATH"
            ls -la "$DMG_PATH"
            echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV
          else
            echo "❌ No DMG found"
          fi
          
          APP_PATH=$(find src-tauri -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "✅ Found APP: $APP_PATH"
            ls -la "$APP_PATH"
            echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          else
            echo "❌ No APP found"
          fi

      - name: Upload artifacts (if found)
        uses: actions/upload-artifact@v4
        with:
          name: CLAWDESK-macOS-BUILD
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.APP_PATH }}
          if-no-files-found: ignore